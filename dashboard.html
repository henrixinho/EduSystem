<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSystem - Panel de Gestión</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dashboard-body">

    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="assets/logo.jpg" alt="Logo">
            <h3>EduSystem</h3>
        </div>
        <nav class="sidebar-menu">
            <a href="#" class="active"><i class="fa-solid fa-graduation-cap"></i> Estudiantes</a>
            <a href="#"><i class="fa-solid fa-book-open"></i> Matrículas</a>
            <a href="#"><i class="fa-solid fa-chart-simple"></i> Calificaciones</a>
            <a href="index.html" class="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión</a>
        </nav>
    </div>

    <div class="main-content">
        <header class="main-header">
            <h2>Gestión y Control de Alumnos</h2>
            <div class="user-info">
                <span>Bienvenido, Coordinador</span>
                <i class="fa-solid fa-user-gear"></i>
            </div>
        </header>

        <div class="dashboard-cards">
            <div class="card">
                <div class="card-icon" style="background-color: rgba(11, 108, 182, 0.1); color: #0b6cb6;">
                    <i class="fa-solid fa-users"></i>
                </div>
                <div class="card-info">
                    <h3 id="totalEstudiantes">0</h3>
                    <p>Total Matriculados</p>
                </div>
            </div>
            <div class="card">
                <div class="card-icon" style="background-color: rgba(23, 185, 120, 0.1); color: #17b978;">
                    <i class="fa-solid fa-circle-check"></i>
                </div>
                <div class="card-info">
                    <h3 id="totalActivos">0</h3>
                    <p>Alumnos Activos</p>
                </div>
            </div>
        </div>

        <div class="data-container">
            <div class="table-actions">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="txtBuscar" placeholder="Buscar por nombre o código...">
                </div>
                <button class="btn-primary" id="btnAbrirModal"><i class="fa-solid fa-plus"></i> Registrar Estudiante</button>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Nombres y Apellidos</th>
                            <th>Especialidad</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaEstudiantes">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal" id="modalEstudiante">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitulo">Registrar Nuevo Alumno</h3>
                <span class="close-modal" id="btnCerrarModal">&times;</span>
            </div>
            <form id="formEstudiante">
                <input type="hidden" id="estudianteId">
                <div class="form-group">
                    <label for="codigo">Código de Alumno</label>
                    <input type="text" id="codigo" required placeholder="Ej. A2026102">
                </div>
                <div class="form-group">
                    <label for="nombre">Nombres Completos</label>
                    <input type="text" id="nombre" required placeholder="Ej. Juan Pérez Gómez">
                </div>
                <div class="form-group">
                    <label for="especialidad">Especialidad / Carrera</label>
                    <select id="especialidad" required>
                        <option value="Ingeniería de Sistemas">Ingeniería de Sistemas</option>
                        <option value="Ingeniería Industrial">Ingeniería Industrial</option>
                        <option value="Arquitectura">Arquitectura</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="estado">Estado Académico</label>
                    <select id="estado" required>
                        <option value="Activo">Activo</option>
                        <option value="Inactivo">Inactivo</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit-modal" id="btnGuardar">Guardar Datos</button>
            </form>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
